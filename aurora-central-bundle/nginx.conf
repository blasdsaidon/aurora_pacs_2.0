worker_processes 1;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  keepalive_timeout 65;

  upstream backend_upstream {
    server host.docker.internal:8080;
  }

  upstream orthanc_central_upstream {
    server orthanc-central:8042;
  }

  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  server {
    listen 80;
    server_name _;

    client_max_body_size 100m;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    location /viewer/ {
      proxy_pass http://orthanc_central_upstream/stone-webviewer/;
    }

    location /dicom-web/ {
      proxy_pass http://orthanc_central_upstream/dicom-web/;
    }

    location /api/ {
      proxy_pass http://backend_upstream;
    }

    location = /login {
      proxy_pass http://backend_upstream/login;
    }

    location = /logout {
      proxy_pass http://backend_upstream/logout;
    }

    location = /dashboard {
      proxy_pass http://backend_upstream/dashboard;
    }

    location = /admin/users {
      proxy_pass http://backend_upstream/admin/users;
    }

    location = / {
      proxy_pass http://backend_upstream/;
    }

    location /app/ {
      return 403;
    }

    location /orthanc/ {
      return 403;
    }

    location /tools/ {
      return 403;
    }
  }
}
