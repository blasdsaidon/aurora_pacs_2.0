spring.application.name=aurora-pacs
server.port=${SERVER_PORT:8080}

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/aurora_pacs
spring.datasource.username=aurora
spring.datasource.password=aurora123
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true

# Orthanc central / viewer
orthanc.base-url=${ORTHANC_BASE_URL:http://localhost:8043}
orthanc.username=${ORTHANC_USERNAME:orthanc}
orthanc.password=${ORTHANC_PASSWORD:orthanc}
orthanc.dicomweb-base=${ORTHANC_DICOMWEB_BASE:http://localhost:8043/dicom-web}
viewer.stone-base-url=/viewer/index.html

# Logging
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=INFO

# Agent auth
internal.agent.api-key=${INTERNAL_AGENT_API_KEY:mi-clave-interna-123456}
